suite: init configuration
templates:
  - templates/init_config.yaml
tests:
  - it: should not configure ACL when auth disabled
    set:
      auth.enabled: false
    asserts:
      - isKind:
          of: ConfigMap
      - notMatchRegex:
          path: data["init.sh"]
          pattern: "aclfile"

  - it: should configure ACL file at /etc/valkey/users.acl with inline passwords
    set:
      auth.enabled: true
      auth.aclUsers:
        admin:
          permissions: "~* &* +@all"
          password: "admin-password"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["init.sh"]
          pattern: "aclfile /etc/valkey/users\\.acl"
      - matchRegex:
          path: data["init.sh"]
          pattern: "mkdir -p /etc/valkey"
      - matchRegex:
          path: data["init.sh"]
          pattern: "chmod 0400 /etc/valkey/users\\.acl"
      - matchRegex:
          path: data["init.sh"]
          pattern: 'cat "/valkey-auth-secret/\$\{username\}-password"'

  - it: should configure ACL file with usersExistingSecret
    set:
      auth.enabled: true
      auth.usersExistingSecret: "my-secret"
      auth.aclUsers:
        admin:
          permissions: "~* &* +@all"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["init.sh"]
          pattern: "aclfile /etc/valkey/users\\.acl"
      - matchRegex:
          path: data["init.sh"]
          pattern: 'cat "/valkey-users-secret/\$password_key"'

  - it: should append aclConfig to generated users
    set:
      auth.enabled: true
      auth.aclUsers:
        admin:
          permissions: "~* &* +@all"
          password: "admin-password"
      auth.aclConfig: |
        user guest on nopass ~public:* +@read
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["init.sh"]
          pattern: "aclfile /etc/valkey/users\\.acl"
      - matchRegex:
          path: data["init.sh"]
          pattern: "Appending custom ACL configuration"
      - matchRegex:
          path: data["init.sh"]
          pattern: "/valkey-auth-secret/aclConfig"

  - it: should have error handling for missing passwords
    set:
      auth.enabled: true
      auth.aclUsers:
        admin:
          permissions: "~* &* +@all"
          password: "admin-password"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["init.sh"]
          pattern: "ERROR.*No password found"

  - it: should use aclConfig only
    set:
      auth.enabled: true
      auth.aclConfig: |
        user admin on >password ~* &* +@all
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["init.sh"]
          pattern: "aclfile /etc/valkey/users\\.acl"
      - matchRegex:
          path: data["init.sh"]
          pattern: "/valkey-auth-secret/aclConfig"

  - it: should use passwordKey for replica authentication when configured
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.replicationUser: "default"
      auth.enabled: true
      auth.usersExistingSecret: "my-secret"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          passwordKey: "valkey-password"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["init.sh"]
          pattern: 'REPL_PASSWORD=\$\(get_user_password "default" "valkey-password"\)'

  - it: should default to username for replica authentication when passwordKey not configured
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.replicationUser: "default"
      auth.enabled: true
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "default-password"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["init.sh"]
          pattern: 'REPL_PASSWORD=\$\(get_user_password "default" "default"\)'

  - it: should use static master assignment when sentinel is disabled
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
    asserts:
      - matchRegex:
          path: data["init.sh"]
          pattern: "Static master assignment"
      - notMatchRegex:
          path: data["init.sh"]
          pattern: "Querying sentinel for current master"

  - it: should query sentinel for master when sentinel is enabled
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.sentinel.enabled: true
    asserts:
      - matchRegex:
          path: data["init.sh"]
          pattern: "Querying sentinel for current master"
      - matchRegex:
          path: data["init.sh"]
          pattern: "SENTINEL get-master-addr-by-name"
      - notMatchRegex:
          path: data["init.sh"]
          pattern: "Static master assignment"

  - it: should fall back to pod-0 when no sentinel is available
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.sentinel.enabled: true
    asserts:
      - matchRegex:
          path: data["init.sh"]
          pattern: "No sentinel available, falling back to pod-0 as initial master"

  - it: should use TLS when querying sentinel with TLS enabled
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.sentinel.enabled: true
      tls.enabled: true
      tls.existingSecret: "tls-secret"
    asserts:
      - matchRegex:
          path: data["init.sh"]
          pattern: "valkey-cli -h .* --tls --cacert /tls/ca\\.crt SENTINEL get-master-addr-by-name"

  - it: should not use TLS when querying sentinel without TLS
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.sentinel.enabled: true
    asserts:
      - notMatchRegex:
          path: data["init.sh"]
          pattern: "--tls --cacert"
      - matchRegex:
          path: data["init.sh"]
          pattern: 'valkey-cli -h "\$PEER" -p "\$SENTINEL_PORT" SENTINEL get-master-addr-by-name'

  - it: should iterate over correct number of pods for sentinel discovery
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.replicas: 2
      replica.sentinel.enabled: true
    asserts:
      - matchRegex:
          path: data["init.sh"]
          pattern: "TOTAL_PODS=3"

  - it: should have correct metadata
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: valkey
