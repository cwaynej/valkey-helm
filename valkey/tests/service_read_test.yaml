suite: read service configuration
templates:
  - templates/service-read.yaml
tests:
  - it: should have correct default service type when replication mode
    set:
      mode: replication
    template: templates/service-read.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
  - it: should be able to set custom clusterIP
    set:
      mode: replication
      services.read.clusterIP: "10.0.0.2"
    template: templates/service-read.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: "10.0.0.2"
  - it: should have correct default ports
    set:
      mode: replication
    template: templates/service-read.yaml
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 6379
            targetPort: tcp
            protocol: TCP
            name: tcp
  - it: should be able to set custom nodePort
    set:
      mode: replication
      services.read.type: "NodePort"
      services.read.nodePort: 30081
    template: templates/service-read.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].nodePort
          value: 30081
  - it: should be able to set custom appProtocol
    set:
      mode: replication
      services.read.appProtocol: "my-protocol"
    template: templates/service-read.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].appProtocol
          value: "my-protocol"
  - it: should be able to set custom loadBalancerClass
    set:
      mode: replication
      services.read.loadBalancerClass: "custom-lb-class"
    template: templates/service-read.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.loadBalancerClass
          value: "custom-lb-class"
  - it: shouldn't have loadBalancerClass by default
    set:
      mode: replication
    template: templates/service-read.yaml
    asserts:
      - isKind:
          of: Service
      - notExists:
          path: spec.loadBalancerClass
  - it: should be able to set loadBalancerSourceRanges
    set:
      mode: replication
      services.read.loadBalancerSourceRanges: ["10.0.0.1"]
    template: templates/service-read.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.loadBalancerSourceRanges
          value: ["10.0.0.1"]
  - it: should have correct selector labels
    set:
      mode: replication
    template: templates/service-read.yaml
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/name: valkey
  - it: should not render in standalone mode
    template: templates/service-read.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: should not render when read service is disabled
    set:
      mode: replication
      services.read.enabled: false
    template: templates/service-read.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should select only replicas in sentinel mode
    set:
      mode: sentinel
      persistence.size: "5Gi"
    template: templates/service-read.yaml
    asserts:
      - equal:
          path: spec.selector.valkey-role
          value: replica

  - it: should not have role selector without sentinel
    set:
      mode: replication
    template: templates/service-read.yaml
    asserts:
      - notExists:
          path: spec.selector.valkey-role
